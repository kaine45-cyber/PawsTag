services:
  postgres:
    image: postgres:16-alpine
    container_name: pawstag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pawstag
      POSTGRES_USER: pawstag
      POSTGRES_PASSWORD: pawstag
    ports:
      - "5443:5432"          # 5443 ở host để tránh trùng PostgreSQL/khác chiếm 5432/5433
    volumes:
      - pawstag_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawstag -d pawstag"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pawstag_pgdata:
