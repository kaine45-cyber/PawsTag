server:
  port: 8080
  servlet:
    context-path: /api          # khớp axios baseURL .../api ở frontend

spring:
  application:
    name: pawstag-backend
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  datasource:
    url: jdbc:postgresql://localhost:5433/pawstag
    username: pawstag
    password: pawstag
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway quản schema; JPA chỉ validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# OpenAPI / Swagger UI  →  http://localhost:8080/api/swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  login:
    max-attempts: 5             # sai quá số lần này → khóa
    lock-minutes: 5             # thời gian khóa (phút)
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-in-prod-min-32-bytes-long-string}
    expiration-ms: 86400000     # 24h
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  upload:
    dir: ${UPLOAD_DIR:uploads}                       # thư mục lưu file trên đĩa
    base-url: ${UPLOAD_BASE_URL:http://localhost:8080/api}  # tiền tố URL công khai
  geocoding:
    enabled: ${GEOCODING_ENABLED:true}               # reverse-geocode khi scan
    url: ${GEOCODING_URL:https://nominatim.openstreetmap.org}
  ratelimit:
    per-minute: ${RATE_LIMIT_PER_MINUTE:100}         # giới hạn req/phút/IP cho endpoint công khai

logging:
  level:
    org.flywaydb: INFO
    vn.pawstag: DEBUG
