server:
  port: ${PORT:8082}
  forward-headers-strategy: ${FORWARD_HEADERS_STRATEGY:native}
  servlet:
    context-path: /api

spring:
  application:
    name: pawstag-backend
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:5MB}
      max-request-size: ${MAX_REQUEST_SIZE:6MB}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5443/pawstag}
    username: ${SPRING_DATASOURCE_USERNAME:pawstag}
    password: ${SPRING_DATASOURCE_PASSWORD:pawstag}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  login:
    max-attempts: ${LOGIN_MAX_ATTEMPTS:5}
    lock-minutes: ${LOGIN_LOCK_MINUTES:5}
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-in-prod-min-32-bytes-long-string}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  upload:
    dir: ${UPLOAD_DIR:uploads}
    base-url: ${UPLOAD_BASE_URL:http://localhost:${PORT:8082}/api}
  geocoding:
    enabled: ${GEOCODING_ENABLED:true}
    url: ${NOMINATIM_URL:https://nominatim.openstreetmap.org}
    goong-url: ${GOONG_API_URL:https://rsapi.goong.io}
    goong-api-key: ${GOONG_API_KEY:}
  ratelimit:
    per-minute: ${RATE_LIMIT_PER_MINUTE:100}
  otp:
    expiry-minutes: ${OTP_EXPIRY_MINUTES:10}
    max-attempts: ${OTP_MAX_ATTEMPTS:5}
    resend-cooldown-seconds: ${OTP_RESEND_COOLDOWN_SECONDS:60}
  mail:
    # Mặc định dùng chính tài khoản SMTP để tránh Gmail/provider từ chối sender giả.
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}   # OAuth 2.0 Web Client ID — bắt buộc để verify Google ID token
  facebook:
    app-id: ${FACEBOOK_APP_ID:}         # Facebook App ID — bắt buộc để verify access token
    app-secret: ${FACEBOOK_APP_SECRET:} # App Secret — dùng cho debug_token + appsecret_proof

logging:
  level:
    org.flywaydb: ${FLYWAY_LOG_LEVEL:INFO}
    vn.pawstag: ${APP_LOG_LEVEL:INFO}
